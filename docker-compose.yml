version: '3.8'

services:
  # Laravel API
  api:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: sms_erp_api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - storage_data:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sms_erp
      DB_USERNAME: ${DB_USERNAME:-sms_erp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sms_erp_network

  # React Frontend
  web:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: sms_erp_web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:8000/api}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - api
    networks:
      - sms_erp_network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: sms_erp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sms_erp
      MYSQL_USER: ${DB_USERNAME:-sms_erp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
    networks:
      - sms_erp_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sms_erp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sms_erp_network

  # Queue Worker
  worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: sms_erp_worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - storage_data:/var/www/html/storage
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sms_erp
      DB_USERNAME: ${DB_USERNAME:-sms_erp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    depends_on:
      - api
      - mysql
      - redis
    networks:
      - sms_erp_network

  # Task Scheduler
  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: sms_erp_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - storage_data:/var/www/html/storage
    command: php artisan schedule:run
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sms_erp
      DB_USERNAME: ${DB_USERNAME:-sms_erp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    depends_on:
      - api
      - mysql
      - redis
    networks:
      - sms_erp_network

volumes:
  mysql_data:
  storage_data:

networks:
  sms_erp_network:
    driver: bridge
